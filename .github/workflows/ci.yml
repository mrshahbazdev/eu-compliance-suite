name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: php -l (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['7.4', '8.0', '8.1', '8.2', '8.3']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: none
          coverage: none

      - name: Lint every PHP file under plugins/
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r -d '' f; do
            if ! out=$(php -l "$f" 2>&1); then
              echo "::error file=$f::$out"
              fail=1
            fi
          done < <(find plugins -type f -name '*.php' -print0)
          exit $fail
